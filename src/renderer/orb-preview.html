<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light" />
    <title>Orb preview</title>
    <link rel="stylesheet" href="/src/assets/main.css" />
    <style>
      .start-page {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div class="start-page">
      <div class="start-page-hero-copy"><h1>DiSCOVER</h1></div>
      <div class="start-page-inner">
        <div class="start-mark" aria-hidden="true">
          <div class="start-orb">
            <span class="start-orb-bloom"></span>
            <span class="start-orb-rays"></span>
            <span class="start-orb-aura"></span>
            <span class="start-orb-spark start-orb-spark-1"></span>
            <span class="start-orb-spark start-orb-spark-2"></span>
            <span class="start-orb-spark start-orb-spark-3"></span>
            <span class="start-orb-spark start-orb-spark-4"></span>
            <img src="/aether-mark.svg" alt="" draggable="false" />
          </div>
        </div>
        <form class="start-search">
          <input placeholder="Search the web or enter a URL" type="text" />
          <button type="submit">Go</button>
        </form>
      </div>
    </div>
  </body>
</html>
