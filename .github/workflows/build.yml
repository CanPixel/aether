name: Build installers

# Builds native installers per platform. Windows also builds on every branch push
# so the latest test installer can be downloaded from the run artifacts on a
# Windows machine. Release tags publish a small, clean set of stable installer
# asset names for direct latest-download links.
# Off macOS, llama.cpp builds CPU-only (the `metal` feature is gated to macOS in
# src-tauri/Cargo.toml).
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

env:
  CARGO_HTTP_MULTIPLEXING: 'false'
  CARGO_HTTP_TIMEOUT: '60'
  CARGO_NET_RETRY: '10'

jobs:
  macos:
    name: macOS DMG
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: aether-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  linux:
    name: Linux (x86_64)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang libclang-dev pkg-config file patchelf \
            libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run typecheck:web
      - run: bun run tauri build --bundles deb,appimage
      - run: scripts/normalize-deb-package.sh src-tauri/target/release/bundle/deb/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: aether-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  linux-arm64:
    name: Linux (ARM64)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang libclang-dev pkg-config file patchelf \
            libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run typecheck:web
      - run: bun run tauri build --bundles deb
      - run: scripts/normalize-deb-package.sh src-tauri/target/release/bundle/deb/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: aether-linux-arm64
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  windows:
    name: Windows installer (x86_64)
    runs-on: windows-latest
    env:
      # llama.cpp's bindgen needs libclang; LLVM ships preinstalled on this image.
      LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run typecheck:web
      - run: bun run tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: aether-windows-x86_64
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  android:
    name: Android (APK)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Best-effort: the live browser surface uses desktop child webviews that don't
    # exist on Android yet (see README), and a release APK needs a signing keystore.
    continue-on-error: true
    env:
      NDK_VERSION: '27.1.12297006'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      # arm64-v8a only. The 32-bit armv7 ABI breaks llama-cpp-sys-2's build script
      # (Cargo doesn't set CARGO_CFG_TARGET_FEATURE for it), and aarch64 covers the
      # overwhelming majority of real Android devices.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - run: bun install --frozen-lockfile
      - run: bun run tauri android build --apk --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: aether-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    # Only on tag pushes. Android is deliberately excluded from public releases
    # until the mobile build is signed and product-ready.
    needs: [macos, linux, linux-arm64, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release installer assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          copy_first_from_artifact() {
            local artifact="$1"
            local pattern="$2"
            local target="$3"
            local source

            source="$(find "artifacts/$artifact" -type f -name "$pattern" | sort | head -n 1)"
            if [[ -z "$source" ]]; then
              echo "No artifact matched $artifact/$pattern; skipping $target"
              return 0
            fi

            cp "$source" "release-assets/$target"
            echo "Created stable alias release-assets/$target from $source"
          }

          copy_first_from_artifact "aether-macos-dmg" "*.dmg" "AETHER_macOS.dmg"
          copy_first_from_artifact "aether-windows-x86_64" "*.exe" "AETHER_x64-setup.exe"
          copy_first_from_artifact "aether-linux-x86_64" "*.deb" "AETHER_amd64.deb"
          copy_first_from_artifact "aether-linux-x86_64" "*.AppImage" "AETHER_amd64.AppImage"
          copy_first_from_artifact "aether-linux-arm64" "*.deb" "AETHER_arm64.deb"

      - name: Create release and attach installers
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/*
