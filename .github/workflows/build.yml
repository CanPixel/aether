name: Build installers

# Builds the cross-platform installers that can't be cross-compiled from macOS.
# Windows also builds on every branch push so the latest test installer can be
# downloaded from the run artifacts on a Windows machine.
# Run all platforms from the Actions tab (Run workflow) or by pushing a v* tag.
# Off macOS, llama.cpp builds CPU-only (the `metal` feature is gated to macOS in
# src-tauri/Cargo.toml).
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  linux:
    name: Linux (x86_64)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang libclang-dev pkg-config file patchelf \
            libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run typecheck:web
      - run: bun run tauri build --bundles deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: aether-linux-x86_64
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  windows:
    name: Windows installer (x86_64)
    runs-on: windows-latest
    env:
      # llama.cpp's bindgen needs libclang; LLVM ships preinstalled on this image.
      LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: bun install --frozen-lockfile
      - run: bun run typecheck:web
      - run: bun run tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: aether-windows-x86_64
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  android:
    name: Android (APK)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Best-effort: the live browser surface uses desktop child webviews that don't
    # exist on Android yet (see README), and a release APK needs a signing keystore.
    continue-on-error: true
    env:
      NDK_VERSION: "27.1.12297006"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - run: bun install --frozen-lockfile
      - run: bun run android:build:apk

      - uses: actions/upload-artifact@v4
        with:
          name: aether-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    # Only on tag pushes. Runs after the builds; android is best-effort, so a missing
    # APK won't block the release.
    needs: [linux, windows, android]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release and attach installers
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.apk
