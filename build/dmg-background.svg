<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" role="img" aria-labelledby="title desc">
  <title id="title">Æther macOS DMG installer background</title>
  <desc id="desc">A delicate icy installer background with an Æther orb hero, install arrow, and two icon landing zones.</desc>
  <defs>
    <radialGradient id="wash" cx="54%" cy="24%" r="78%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#effbff"/>
      <stop offset="0.7" stop-color="#d9f1fb"/>
      <stop offset="1" stop-color="#edf5fc"/>
    </radialGradient>
    <radialGradient id="orbHalo" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="0.34" stop-color="#c8f4ff" stop-opacity="0.48"/>
      <stop offset="0.72" stop-color="#6fd2ef" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6fd2ef" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandText" x1="196" y1="51" x2="466" y2="97" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10233c"/>
      <stop offset="0.48" stop-color="#1f8eaa"/>
      <stop offset="0.72" stop-color="#e9fbff"/>
      <stop offset="1" stop-color="#6457c8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="660" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#8fd5ef" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softLift" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#5c96b7" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ffffff" flood-opacity="0.72"/>
    </filter>
    <filter id="textLift" x="-30%" y="-80%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7fb4ce" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffffff" flood-opacity="0.88"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#9fd5e8" stroke-width="0.55" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="660" height="420" fill="url(#wash)"/>
  <rect width="660" height="420" fill="url(#grid)" opacity="0.74"/>

  <g opacity="0.72">
    <path d="M-18 118C88 82 182 142 292 105c94-32 177-72 294-18 48 22 82 21 113 13" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.42"/>
    <path d="M-22 170C92 128 176 189 292 151c92-30 184-76 306-20 34 16 70 19 101 8" fill="none" stroke="#9adff2" stroke-width="7" stroke-linecap="round" opacity="0.18"/>
    <path d="M-12 311C91 272 190 326 298 294c91-27 172-71 294-19 45 19 77 18 116 7" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" opacity="0.34"/>
    <path d="M8 346C109 318 208 366 320 334c100-29 177-58 278-18 42 17 72 17 102 7" fill="none" stroke="#77d3e8" stroke-width="6" stroke-linecap="round" opacity="0.16"/>
  </g>

  <ellipse cx="331" cy="258" rx="244" ry="106" fill="#ffffff" opacity="0.24" filter="url(#softLift)"/>
  <ellipse cx="330" cy="253" rx="214" ry="72" fill="#b8edf9" opacity="0.13"/>

  <g filter="url(#textLift)">
    <text x="330" y="70" text-anchor="middle" font-family="New York, Iowan Old Style, Avenir Next, -apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="34" font-weight="600" letter-spacing="7" fill="url(#brandText)">ÆTHER</text>
    <text x="330" y="100" text-anchor="middle" font-family="Avenir Next, -apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="12" font-weight="600" letter-spacing="1.8" fill="#58708f" opacity="0.82">Drag into Applications to install</text>
  </g>

  <g transform="translate(330 176)" filter="url(#softLift)">
    <circle r="88" fill="url(#orbHalo)"/>
    <circle r="62" fill="#ffffff" opacity="0.28"/>
    <image href="dmg-orb.png" x="-58" y="-58" width="116" height="116" opacity="0.96"/>
  </g>

  <g opacity="0.9">
    <circle cx="180" cy="270" r="72" fill="#ffffff" opacity="0.2"/>
    <circle cx="180" cy="270" r="70" fill="none" stroke="url(#line)" stroke-width="1.4"/>
    <circle cx="480" cy="270" r="72" fill="#ffffff" opacity="0.2"/>
    <circle cx="480" cy="270" r="70" fill="none" stroke="url(#line)" stroke-width="1.4"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.76" filter="url(#textLift)">
    <path d="M266 270H394" stroke="#6bb8d2" stroke-width="2.4"/>
    <path d="M379 254 396 270 379 286" stroke="#6bb8d2" stroke-width="2.4"/>
    <path d="M276 254C310 225 350 225 384 254" stroke="#ffffff" stroke-width="7" opacity="0.48"/>
  </g>

  <path d="M86 386H574" stroke="url(#line)" stroke-width="1"/>
  <text x="330" y="397" text-anchor="middle" font-family="Avenir Next, -apple-system, BlinkMacSystemFont, Helvetica Neue, sans-serif" font-size="9" font-weight="520" letter-spacing="0.9" fill="#7890aa" opacity="0.7">Local research browser · private knowledge capture · grounded AiON</text>
</svg>
